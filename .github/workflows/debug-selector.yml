name: debug-selector

# Throwaway: renders a product URL on the runner and dumps price-relevant
# markup so we can pick a stable selector. Delete once the selector is set.
on:
  workflow_dispatch:
    inputs:
      url:
        description: Product URL to inspect
        required: true
        default: https://store.google.com/product/nest_hub_2nd_gen?hl=en-US

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install playwright beautifulsoup4 && playwright install --with-deps chromium
      - name: Inspect
        env:
          URL: ${{ inputs.url }}
        run: |
          python - <<'PY'
          import os, re, json
          from playwright.sync_api import sync_playwright
          url = os.environ["URL"]
          with sync_playwright() as p:
              b = p.chromium.launch()
              pg = b.new_page(user_agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36")
              pg.goto(url, wait_until="networkidle", timeout=60000)
              html = pg.content()
              final = pg.url
              title = pg.title()
              b.close()
          print("FINAL_URL:", final)
          print("TITLE:", title)
          print("HTML_LEN:", len(html))
          print("DOLLAR_MATCHES:", re.findall(r"\$[0-9][0-9,]*(?:\.[0-9]{2})?", html)[:30])
          print("HAS_LD_JSON:", "application/ld+json" in html)
          for m in re.findall(r'<script[^>]*application/ld\+json[^>]*>(.*?)</script>', html, re.S)[:3]:
              print("LD_JSON:", m[:800])
          # Print small HTML windows around each $ occurrence to reveal wrapping tags/attrs
          for i, mo in enumerate(re.finditer(r"\$[0-9]", html)):
              if i >= 8: break
              s = max(0, mo.start()-160)
              print(f"--- context {i} ---")
              print(html[s:mo.start()+40])
          PY