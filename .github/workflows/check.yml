name: price-check

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours UTC
  workflow_dispatch:         # manual "Run workflow" button

permissions:
  contents: write            # needed to commit state.json back

concurrency:
  group: price-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      # Only needed if any watchlist item has render_js: true
      - name: Install Playwright browser
        run: |
          if grep -q '"render_js": true' watchlist.json; then
            pip install playwright && playwright install --with-deps chromium
          fi

      - name: Run checker
        id: run
        continue-on-error: true
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT: ${{ secrets.TG_CHAT }}
        run: python checker.py

      - name: Commit state & history
        run: |
          git config user.name  "price-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state.json history.csv
          git diff --staged --quiet || git commit -m "chore: price check $(date -u +%Y-%m-%dT%H:%M)"
          git push

      - name: Fail run if checker errored
        if: steps.run.outcome == 'failure'
        run: exit 1
